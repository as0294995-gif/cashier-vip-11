<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restaurant POS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

<header class="header">

<div class="logo">

<h1>Restaurant POS</h1>

<p>برنامج كاشير احترافي</p>

</div>

<div class="header-right">

<div id="currentDate">00 / 00 / 0000</div>

<div id="currentTime">00:00:00</div>

</div>

</header>

<main class="main">

<aside class="left-panel">

<div class="search-box">

<input
type="text"
id="search"
placeholder="ابحث عن صنف...">

</div>

<div class="categories">

<button class="category active">الكل</button>

<button class="category">فول</button>

<button class="category">طعمية</button>

<button class="category">ساندويتشات</button>

<button class="category">مشروبات</button>

<button class="category">إضافات</button>

</div>

<div class="products" id="products">

<button class="product" data-name="فول سادة" data-price="10">
<span>🥣</span>
<h3>فول سادة</h3>
<p>10 جنيه</p>
</button>

<button class="product" data-name="فول زيت" data-price="12">
<span>🫒</span>
<h3>فول زيت</h3>
<p>12 جنيه</p>
</button>

<button class="product" data-name="طعمية" data-price="8">
<span>🧆</span>
<h3>طعمية</h3>
<p>8 جنيه</p>
</button>

<button class="product" data-name="طعمية محشية" data-price="10">
<span>🧆</span>
<h3>طعمية محشية</h3>
<p>10 جنيه</p>
</button>

<button class="product" data-name="بطاطس" data-price="15">
<span>🍟</span>
<h3>بطاطس</h3>
<p>15 جنيه</p>
</button>

<button class="product" data-name="بيض" data-price="20">
<span>🥚</span>
<h3>بيض</h3>
<p>20
<tfoot>

<tr>

<td colspan="3">
الإجمالي
</td>

<td id="totalPrice">
0.00
</td>

</tr>

</tfoot>

</table>

<div class="payment-box">

<div class="input-group">

<label>
الخصم
</label>

<input
type="number"
id="discount"
value="0"
placeholder="0">

</div>

<div class="input-group">

<label>
المدفوع
</label>

<input
type="number"
id="paid"
placeholder="0">

</div>

<div class="input-group">

<label>
الباقي
</label>

<input
type="text"
id="change"
value="0.00"
readonly>

</div>

</div>

<div class="actions">

<button id="newOrder">
طلب جديد
</button>

<button id="deleteItem">
حذف صنف
</button>

<button id="clearBill">
مسح الفاتورة
</button>

<button id="printBill">
طباعة الفاتورة
</button>

</div>

</section>

</

<footer class="footer">

<p>
Restaurant POS © 2026
</p>

</footer>

</div>

<script src="js/script.js"></script>

</body>

</html>
